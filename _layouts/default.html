<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>
  <div class="cursor-main" id="cursor"></div>
  <header>
    <div class="top">
      <div>
        <h1 class="header-title"><a href="/" class="header-home-link">alice ma.</a></h1>
        <p class="header-subtitle">strategy consultant and recreational tinkerer</p>
      </div>
      <div class="header-socials">
        <a class="btn" href="https://github.com/{{ site.github_username }}" target="_blank">github</a>
        {% if site.linkedin_username != "" %}
        <a class="btn" href="https://linkedin.com/in/{{ site.linkedin_username }}" target="_blank">linkedin</a>
        {% endif %}
<a class="btn" href="mailto:{{ site.email }}">email</a>
      </div>
    </div>
  </header>
  {{ content }}
  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
